services:
  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file: .env.production
    # API is NOT exposed externally — nginx in web container proxies /api/ to it
    expose:
      - "4000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  rendertron:
    image: rendertron/rendertron:latest
    restart: always
    expose:
      - "3000"
    environment:
      TIMEOUT: "10000"
    # No external port — only nginx reaches it

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Empty = same-origin; nginx proxies /api/ to the api container
        VITE_API_URL: ""
        VITE_FRONTEND_URL: "https://ddotsmediajobs.com"
    restart: always
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      rendertron:
        condition: service_started

volumes:
  mariadb_data:
  redis_data:
  uploads:
