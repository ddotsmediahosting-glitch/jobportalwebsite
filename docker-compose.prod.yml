services:
  mariadb:
    image: mariadb:11
    restart: always
    # env_file loads MARIADB_* vars directly into the container so they don't
    # depend on compose-level ${VAR} substitution (which only reads .env, not
    # .env.production). Blank vars caused "dependency failed to start".
    env_file: .env.production
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      # First-init can take 30–60s on slower hosts; give MariaDB room to come
      # up before failed checks count against the retry budget.
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file: .env.production
    # Hardcode internal service URLs so they always match the compose service
    # names regardless of what's in .env.production (which can drift from
    # .env / dev URLs and silently break inter-container connectivity).
    environment:
      REDIS_URL: redis://redis:6379
    expose:
      - "4000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health 2>/dev/null | grep -q '\"status\"' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      # First deploy on a slow host or after a network reset can take 60-90s
      # before mariadb is reachable from the api container; the entrypoint
      # retries up to 30 times. Give the healthcheck enough start_period to
      # absorb that without being marked unhealthy.
      start_period: 120s

  prerender:
    build:
      context: ./prerender
    restart: always
    environment:
      FRONTEND_URL: "http://web:80"
      CACHE_TTL: "300"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_FRONTEND_URL: "https://ddotsmediajobs.com"
    restart: always
    ports:
      - "8080:80"
    depends_on:
      # web is the static-files server (nginx). It doesn't strictly need the
      # api to be healthy — it can serve the SPA shell and the api proxy
      # will work once api is up. Using service_started instead of
      # service_healthy stops compose from giving up on the deploy when
      # api needs >60s to clear its first-time db connection retries.
      api:
        condition: service_started

volumes:
  mariadb_data:
  redis_data:
  uploads:
