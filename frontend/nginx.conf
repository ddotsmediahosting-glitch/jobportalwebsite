map $http_user_agent $prerender {
    default       0;
    ~*(googlebot|bingbot|yandexbot|duckduckbot|slurp|baiduspider|facebot|twitterbot|linkedinbot|whatsapp|telegrambot|applebot|pinterestbot|redditbot|discordbot) 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── TCP / connection optimisation ────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml text/javascript
               application/ld+json application/manifest+json font/woff2;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # ── Security headers ─────────────────────────────────────────────────────

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking — no iframing of this site
    add_header X-Frame-Options "DENY" always;

    # HSTS — tell browsers to always use HTTPS (1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Referrer — send origin only on cross-origin requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions — disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    # Content Security Policy
    # script-src: 'self' for Vite bundles; 'unsafe-inline' for JSON-LD script tags in index.html
    # style-src:  'unsafe-inline' for React inline styles + Tailwind; Google Fonts stylesheet
    # img-src:    https: covers CDN-hosted logos/avatars; data: for base64; blob: for previews
    # connect-src: self + wss for future websockets
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' wss:; media-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Proxy API requests to backend container
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Proxy uploads
    location /uploads/ {
        proxy_pass http://api:4000/uploads/;
        proxy_set_header Host $host;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://api:4000/health;
    }

    # SEO files — served from backend
    location = /robots.txt {
        proxy_pass http://api:4000/robots.txt;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        proxy_pass http://api:4000/sitemap.xml;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # Serve static assets with long-term caching (Vite uses content hashes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — bots get prerendered HTML, users get index.html
    location / {
        try_files $uri @router;
    }

    location @router {
        if ($prerender = 1) {
            proxy_pass http://prerender:3000/render?url=https://ddotsmediajobs.com$request_uri;
        }
        rewrite ^ /index.html last;
    }
}
