# ── Bot user-agent detection ────────────────────────────────────────────────
map $http_user_agent $is_bot {
    default                          0;
    ~*Googlebot                      1;
    ~*bingbot                        1;
    ~*Slurp                          1;
    ~*DuckDuckBot                    1;
    ~*Baiduspider                    1;
    ~*YandexBot                      1;
    ~*facebookexternalhit            1;
    ~*Twitterbot                     1;
    ~*LinkedInBot                    1;
    ~*WhatsApp                       1;
    ~*Slackbot                       1;
    ~*TelegramBot                    1;
    ~*ia_archiver                    1;
    ~*AhrefsBot                      1;
    ~*SemrushBot                     1;
    ~*MJ12bot                        1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss image/svg+xml
               text/javascript application/ld+json;
    gzip_min_length 1024;
    gzip_comp_level 5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Prerendering: bots on SPA routes → Rendertron ─────────────────────
    # Skip prerender for: static assets, API, health, sitemap, robots
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|json|xml|txt)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /uploads/ {
        proxy_pass http://api:4000/uploads/;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:4000/health;
    }

    # SEO files — served from backend
    location = /robots.txt {
        proxy_pass http://api:4000/robots.txt;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        proxy_pass http://api:4000/sitemap.xml;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA routes — serve prerendered HTML to bots, index.html to humans
    location / {
        # Route bots to Rendertron
        if ($is_bot) {
            rewrite ^(.*)$ /rendertron$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Rendertron internal proxy (never exposed publicly)
    location ^~ /rendertron/ {
        # Strip the /rendertron prefix and forward to Rendertron service
        rewrite ^/rendertron(/.*)$ $1 break;
        proxy_pass http://rendertron:3000/render/https://ddotsmediajobs.com$uri;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
        # Cache prerendered pages for 1 hour
        proxy_cache_valid 200 1h;
        add_header X-Prerendered "true";
    }
}
