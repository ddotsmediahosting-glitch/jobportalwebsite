server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Proxy API requests to backend container
    location /api/ {
        proxy_pass http://api:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Proxy uploads
    location /uploads/ {
        proxy_pass http://api:4000/uploads/;
        proxy_set_header Host $host;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://api:4000/health;
    }

    # SEO files — serve from backend at root paths
    location = /robots.txt {
        proxy_pass http://api:4000/robots.txt;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        proxy_pass http://api:4000/sitemap.xml;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    # Serve static assets with long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
