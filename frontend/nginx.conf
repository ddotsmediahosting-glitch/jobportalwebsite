map $http_user_agent $prerender {
    default       0;
    ~*(googlebot|bingbot|yandexbot|duckduckbot|slurp|baiduspider|facebot|twitterbot|linkedinbot|whatsapp|telegrambot|applebot|pinterestbot|redditbot|discordbot) 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        text/x-component
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/ld+json
        application/manifest+json
        application/geo+json
        application/wasm
        image/svg+xml
        font/truetype
        font/opentype
        font/woff2;

    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' wss:; media-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location /api/ {
        proxy_pass             http://api:4000/api/;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
        add_header             Cache-Control     "no-store" always;
    }

    location /uploads/ {
        proxy_pass http://api:4000/uploads/;
        proxy_set_header Host $host;
        expires    30d;
        add_header Cache-Control "public, immutable";
    }

    location /health {
        proxy_pass http://api:4000/health;
        access_log off;
    }

    location = /robots.txt {
        proxy_pass http://api:4000/robots.txt;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /sitemap.xml {
        proxy_pass http://api:4000/sitemap.xml;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }

    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header Vary          "Accept-Encoding";
        try_files  $uri =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        add_header Vary          "Accept-Encoding";
        try_files  $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        try_files $uri =404;
    }

    # SPA fallback — prerender check MUST be here, not in the named @router
    # location. nginx does not allow proxy_pass inside if blocks in named
    # locations; placing it there silently breaks the rewrite for all users.
    location / {
        if ($prerender = 1) {
            proxy_pass http://prerender:3000/render?url=https://ddotsmediajobs.com$request_uri;
        }
        try_files $uri @router;
    }

    location @router {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
        rewrite ^ /index.html last;
    }
}
