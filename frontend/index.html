<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO ─────────────────────────────────────────────────────── -->
    <!--
      Title formula: [Primary Keyword] – [Secondary Keyword] | [Brand]
      Keep under 60 characters. Lead with keywords, end with brand.
    -->
    <title>Jobs in UAE | Dubai, Abu Dhabi &amp; Sharjah Vacancies 2026 – DdotsmediaJobs</title>
    <meta name="description" content="Find the latest jobs in UAE. Browse thousands of vacancies in Dubai, Abu Dhabi, Sharjah and across the Emirates. Full-time, part-time, fresher &amp; visa-sponsored roles. Apply free today." />
    <meta name="keywords" content="jobs in UAE, jobs in Dubai, jobs in Abu Dhabi, UAE vacancies, job portal UAE, Dubai job openings, find jobs UAE, Sharjah jobs, fresher jobs Dubai, visa sponsored jobs UAE" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="author" content="DdotsmediaJobs" />

    <!-- Canonical (overridden per-page by SEOHead) ───────────────────────── -->
    <link rel="canonical" href="https://ddotsmediajobs.com/" />

    <!-- Open Graph ──────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DdotsmediaJobs" />
    <meta property="og:title" content="Jobs in UAE | Dubai, Abu Dhabi &amp; Sharjah Vacancies 2026 – DdotsmediaJobs" />
    <meta property="og:description" content="Find the latest jobs in UAE. Browse thousands of vacancies in Dubai, Abu Dhabi, Sharjah and across all Emirates. Full-time, part-time, fresher &amp; visa-sponsored roles. Apply free today." />
    <meta property="og:image" content="https://ddotsmediajobs.com/og-default.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DdotsmediaJobs – UAE Jobs Portal" />
    <meta property="og:url" content="https://ddotsmediajobs.com" />
    <meta property="og:locale" content="en_AE" />

    <!-- Twitter Card ────────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DdotsmediaJobs" />
    <meta name="twitter:title" content="Jobs in UAE | Dubai, Abu Dhabi &amp; Sharjah Vacancies 2026 – DdotsmediaJobs" />
    <meta name="twitter:description" content="Find the latest jobs in UAE. Browse vacancies in Dubai, Abu Dhabi, Sharjah and across the Emirates. Apply free today." />
    <meta name="twitter:image" content="https://ddotsmediajobs.com/og-default.svg" />

    <!-- Structured Data: WebSite with SearchAction ──────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DdotsmediaJobs",
      "alternateName": "UAE Jobs Portal",
      "url": "https://ddotsmediajobs.com",
      "description": "UAE's job portal – find verified jobs in Dubai, Abu Dhabi, Sharjah and all Emirates.",
      "inLanguage": "en",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://ddotsmediajobs.com/jobs?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization ──────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DdotsmediaJobs",
      "url": "https://ddotsmediajobs.com",
      "logo": "https://ddotsmediajobs.com/logo-icon.svg",
      "description": "UAE job portal listing vacancies in Dubai, Abu Dhabi, Sharjah and across the Emirates.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "AE",
        "addressRegion": "Dubai"
      },
      "sameAs": [
        "https://www.linkedin.com/company/ddotsmediajobs",
        "https://www.instagram.com/ddotsmediajobs"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English", "Arabic"]
      }
    }
    </script>

    <!-- Structured Data: FAQPage ────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I find jobs in Dubai?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Browse DdotsmediaJobs.com for the latest vacancies in Dubai. Use the search bar to filter by job title, salary, work mode, and industry. New jobs are added daily across all major sectors including technology, finance, healthcare, and hospitality."
          }
        },
        {
          "@type": "Question",
          "name": "Are jobs in Dubai free to apply for?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — applying for jobs on DdotsmediaJobs is completely free for job seekers. Create a free account, upload your CV, and apply to thousands of verified vacancies across the UAE with a single click."
          }
        },
        {
          "@type": "Question",
          "name": "What industries are hiring in UAE in 2026?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Technology, healthcare, construction, hospitality, logistics, and finance are among the top hiring sectors in the UAE in 2026. DdotsmediaJobs lists thousands of roles across all industries in Dubai, Abu Dhabi, Sharjah and all seven Emirates."
          }
        }
      ]
    }
    </script>

    <!-- Performance ─────────────────────────────────────────────────────── -->
    <!-- DNS prefetch + preconnect for Google Fonts (non-render-blocking) -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- font-display=swap baked into URL: text renders in system font immediately,
         swaps to Inter when loaded. preload triggers an early high-priority fetch. -->
    <link rel="preload" as="style"
          href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
          onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" />
    </noscript>
    <!-- Preconnect to own API origin — eliminates DNS+TCP cost on first XHR -->
    <link rel="preconnect" href="https://ddotsmediajobs.com" />
    <link rel="dns-prefetch" href="https://ddotsmediajobs.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
