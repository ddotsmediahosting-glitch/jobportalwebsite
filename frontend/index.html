<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>DdotsmediaJobs – Find Jobs in UAE | Dubai, Abu Dhabi, Sharjah</title>
    <meta name="description" content="Find the best jobs in UAE – Abu Dhabi, Dubai, Sharjah and all Emirates. Thousands of verified job listings updated daily. Apply now on DdotsmediaJobs." />
    <meta name="keywords" content="jobs UAE, Dubai jobs, Abu Dhabi jobs, Sharjah jobs, employment UAE, careers UAE, job portal UAE" />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#2563eb" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DdotsmediaJobs" />
    <meta property="og:title" content="DdotsmediaJobs – Find Jobs in UAE" />
    <meta property="og:description" content="Find the best jobs in UAE – Abu Dhabi, Dubai, Sharjah and all Emirates. Thousands of verified job listings." />
    <meta property="og:image" content="/og-default.png" />
    <meta property="og:url" content="https://ddotsmediajobs.com" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DdotsmediaJobs" />
    <meta name="twitter:title" content="DdotsmediaJobs – Find Jobs in UAE" />
    <meta name="twitter:description" content="Find the best jobs in UAE. Thousands of verified listings in Dubai, Abu Dhabi, Sharjah and all Emirates." />
    <meta name="twitter:image" content="/og-default.png" />

    <!-- Structured Data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DdotsmediaJobs",
      "url": "https://ddotsmediajobs.com",
      "description": "UAE's leading job portal – find verified jobs in Dubai, Abu Dhabi, Sharjah and all Emirates.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ddotsmediajobs.com/jobs?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
