<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO ─────────────────────────────────────────────────────── -->
    <!--
      Title formula: [Primary Keyword] – [Secondary Keyword] | [Brand]
      Keep under 60 characters. Lead with keywords, end with brand.
    -->
    <title>Jobs in UAE – Dubai, Abu Dhabi, Sharjah | DdotsmediaJobs</title>
    <meta name="description" content="Browse 10,000+ verified jobs in Dubai, Abu Dhabi, Sharjah and all UAE Emirates. Apply free – tech, healthcare, finance, construction and more. Updated daily." />
    <meta name="keywords" content="jobs in UAE, Dubai jobs, Abu Dhabi jobs, Sharjah jobs, UAE employment, careers in Dubai, job vacancies UAE, Gulf jobs" />
    <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:-1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="author" content="DdotsmediaJobs" />

    <!-- Canonical (overridden per-page by SEOHead) ───────────────────────── -->
    <link rel="canonical" href="https://ddotsmediajobs.com" />

    <!-- Open Graph ──────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DdotsmediaJobs" />
    <meta property="og:title" content="Jobs in UAE – Dubai, Abu Dhabi, Sharjah | DdotsmediaJobs" />
    <meta property="og:description" content="Browse 10,000+ verified jobs across the UAE. Apply free on DdotsmediaJobs – Dubai, Abu Dhabi, Sharjah and all Emirates." />
    <meta property="og:image" content="https://ddotsmediajobs.com/og-default.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DdotsmediaJobs – UAE Jobs Portal" />
    <meta property="og:url" content="https://ddotsmediajobs.com" />
    <meta property="og:locale" content="en_AE" />

    <!-- Twitter Card ────────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@DdotsmediaJobs" />
    <meta name="twitter:title" content="Jobs in UAE – Dubai, Abu Dhabi, Sharjah | DdotsmediaJobs" />
    <meta name="twitter:description" content="Browse 10,000+ verified jobs across the UAE. Apply free on DdotsmediaJobs." />
    <meta name="twitter:image" content="https://ddotsmediajobs.com/og-default.svg" />

    <!-- Structured Data: WebSite with SearchAction ──────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "DdotsmediaJobs",
      "alternateName": "UAE Jobs Portal",
      "url": "https://ddotsmediajobs.com",
      "description": "UAE's job portal – find verified jobs in Dubai, Abu Dhabi, Sharjah and all Emirates.",
      "inLanguage": "en",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://ddotsmediajobs.com/jobs?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization ──────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DdotsmediaJobs",
      "url": "https://ddotsmediajobs.com",
      "logo": "https://ddotsmediajobs.com/logo-icon.svg",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": ["English", "Arabic"]
      }
    }
    </script>

    <!-- Performance ─────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="dns-prefetch" href="https://ddotsmediajobs.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
