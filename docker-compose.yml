services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: 5a859d9d62c2cf197ecc82da3ce06a73root
      MARIADB_USER: uaejobs
      MARIADB_PASSWORD: 5a859d9d62c2cf197ecc82da3ce06a73
      MARIADB_DATABASE: uaejobsdb
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://uaejobs:5a859d9d62c2cf197ecc82da3ce06a73@mariadb:3306/uaejobsdb
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
    ports:
      - "4001:4000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_FRONTEND_URL: http://localhost:3001
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mariadb_data:
  redis_data:
