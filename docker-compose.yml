# ── Local preview stack ────────────────────────────────────────────────────────
# Usage:
#   docker compose up --build          → full rebuild + start
#   docker compose up -d postgres redis → DB/cache only (then use npm run dev)
#   docker compose logs -f api          → tail API logs
#
# Access:
#   Frontend : http://localhost:3001
#   API      : http://localhost:4001
#   API Docs : http://localhost:4001/api/docs
#   Health   : http://localhost:4001/health

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: uaejobs
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uaejobs"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    # Override localhost URLs from .env with Docker-internal service hostnames
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/uaejobs
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173,http://localhost:3001
      NODE_ENV: development
    ports:
      - "4001:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Empty = same-origin via nginx proxy (recommended)
        # Set to http://localhost:4001 only if nginx proxy breaks
        VITE_API_URL: ""
        VITE_FRONTEND_URL: http://localhost:3001
    ports:
      - "3001:80"
    depends_on:
      - api

volumes:
  pg_data:
  redis_data:
